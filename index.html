<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <title>Gift Monitor Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root {
            --tg-bg: var(--tg-theme-bg-color, #ffffff);
            --tg-text: var(--tg-theme-text-color, #000000);
            --tg-button: var(--tg-theme-button-color, #667eea);
            --tg-secondary: var(--tg-theme-secondary-bg-color, #f5f5f5);
            --tg-hint: var(--tg-theme-hint-color, #999999);
            --tg-link: var(--tg-theme-link-color, #2481cc);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--tg-bg);
            color: var(--tg-text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overscroll-behavior-y: contain;
            padding-top: 180px;
            padding-bottom: 80px;
        }

        /* ═══════════════════════════════════════════════════════════════
           GLASSMORPHISM
           ═══════════════════════════════════════════════════════════════ */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
        }
        .dark .glass {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* ═══════════════════════════════════════════════════════════════
           GRADIENT BORDER (HOT DEALS)
           ═══════════════════════════════════════════════════════════════ */
        .gradient-border {
            position: relative;
            background: var(--tg-secondary);
            border-radius: 16px;
        }
        .gradient-border::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 18px;
            padding: 2px;
            background: linear-gradient(45deg, #5b5fff, #ff5b8d, #5bffb8, #5b5fff);
            background-size: 300% 300%;
            animation: gradientBorder 3s ease infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            z-index: -1;
        }
        .gradient-border.hot::before {
            background: linear-gradient(45deg, #ff416c, #ff4b2b, #f093fb, #ff416c);
            animation: gradientBorder 2s ease infinite;
        }
        .gradient-border.hot::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(91,95,255,0.1) 0%, transparent 70%);
            pointer-events: none;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes gradientBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        /* ═══════════════════════════════════════════════════════════════
           STICKY HEADER
           ═══════════════════════════════════════════════════════════════ */
        .sticky-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 12px 16px;
            background: var(--tg-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        /* ═══════════════════════════════════════════════════════════════
           CARDS
           ═══════════════════════════════════════════════════════════════ */
        .card {
            background: var(--tg-secondary);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .card:active {
            transform: scale(0.98);
            background: rgba(128, 128, 128, 0.2);
        }

        /* ═══════════════════════════════════════════════════════════════
           SKELETON WITH SHIMMER
           ═══════════════════════════════════════════════════════════════ */
        .skeleton {
            background: linear-gradient(
                90deg,
                rgba(255,255,255,0.05) 25%,
                rgba(255,255,255,0.1) 50%,
                rgba(255,255,255,0.05) 75%
            );
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ═══════════════════════════════════════════════════════════════
           TABS
           ═══════════════════════════════════════════════════════════════ */
        .tab {
            padding: 12px;
            text-align: center;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .tab-active {
            background: var(--tg-button);
            color: white;
        }

        /* ═══════════════════════════════════════════════════════════════
           PULL TO REFRESH
           ═══════════════════════════════════════════════════════════════ */
        .ptr-container { position: relative; overflow: hidden; }
        .ptr-indicator {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: top 0.2s;
            z-index: 200;
        }
        .ptr-spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ═══════════════════════════════════════════════════════════════
           FILTERS & SEARCH
           ═══════════════════════════════════════════════════════════════ */
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            overflow-x: auto;
        }
        .filter-btn {
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--tg-secondary);
            border: none;
            color: var(--tg-text);
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn.active {
            background: var(--tg-button);
            color: white;
        }
        .search-box {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: none;
            background: var(--tg-secondary);
            color: var(--tg-text);
            font-size: 14px;
            margin-bottom: 12px;
        }

        /* ═══════════════════════════════════════════════════════════════
           CHARTS & SPARKLINES
           ═══════════════════════════════════════════════════════════════ */
        .chart-container {
            position: relative;
            height: 250px;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .sparkline {
            width: 80px;
            height: 32px;
        }

        /* ═══════════════════════════════════════════════════════════════
           ROI BADGES
           ═══════════════════════════════════════════════════════════════ */
        .roi-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
        }
        .roi-positive {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        .roi-negative {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        .roi-neutral {
            background: rgba(234, 179, 8, 0.2);
            color: #eab308;
        }

        /* ═══════════════════════════════════════════════════════════════
           LIQUIDITY SCORES
           ═══════════════════════════════════════════════════════════════ */
        .liquidity-score {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-weight: 700;
            font-size: 12px;
        }
        .liquidity-a { background: #22c55e; color: white; }
        .liquidity-b { background: #84cc16; color: white; }
        .liquidity-c { background: #eab308; color: white; }
        .liquidity-d { background: #ef4444; color: white; }

        /* ═══════════════════════════════════════════════════════════════
           PRICE AGE INDICATOR
           ═══════════════════════════════════════════════════════════════ */
        .price-age {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
        }
        .price-age.fresh { color: #22c55e; }
        .price-age.recent { color: #eab308; }
        .price-age.old { color: #f97316; }
        .price-age.stale { color: #ef4444; }

        /* ═══════════════════════════════════════════════════════════════
           HEATMAP
           ═══════════════════════════════════════════════════════════════ */
        .heatmap-cell {
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            transition: all 0.2s;
        }
        .heatmap-hot {
            background: linear-gradient(135deg, rgba(255,65,108,0.3), rgba(255,75,43,0.3));
        }
        .heatmap-warm {
            background: linear-gradient(135deg, rgba(245,158,11,0.3), rgba(217,119,6,0.3));
        }
        .heatmap-cold {
            background: var(--tg-secondary);
        }

        /* ═══════════════════════════════════════════════════════════════
           COPY BUTTON
           ═══════════════════════════════════════════════════════════════ */
        .copy-btn {
            padding: 4px 8px;
            border-radius: 6px;
            background: var(--tg-secondary);
            border: none;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .copy-btn:active { transform: scale(0.9); }
        .copy-btn.copied {
            background: #22c55e;
            color: white;
        }

        /* ═══════════════════════════════════════════════════════════════
           P&L INPUT & DISPLAY
           ═══════════════════════════════════════════════════════════════ */
        .pnl-input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(128,128,128,0.3);
            background: var(--tg-bg);
            color: var(--tg-text);
            font-size: 14px;
            margin-top: 8px;
        }
        .pnl-input:focus {
            outline: none;
            border-color: var(--tg-button);
        }
        .pnl-display {
            margin-top: 8px;
            padding: 8px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
        }
        .pnl-positive { background: rgba(34,197,94,0.1); color: #22c55e; }
        .pnl-negative { background: rgba(239,68,68,0.1); color: #ef4444; }
        .pnl-neutral { background: rgba(234,179,8,0.1); color: #eab308; }

        /* ═══════════════════════════════════════════════════════════════
           RUNNING TICKER
           ═══════════════════════════════════════════════════════════════ */
        .running-line {
            overflow: hidden;
            white-space: nowrap;
        }
        .running-line-content {
            display: inline-block;
            animation: scroll 30s linear infinite;
        }
        @keyframes scroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* ═══════════════════════════════════════════════════════════════
           MODAL
           ═══════════════════════════════════════════════════════════════ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal-content {
            background: var(--tg-bg);
            border-radius: 16px;
            padding: 20px;
            max-width: 90%;
            width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }

        /* ═══════════════════════════════════════════════════════════════
           QUICK BUY BUTTONS
           ═══════════════════════════════════════════════════════════════ */
        .quick-buy-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
        }
        .quick-buy-btn.tonnel { background: linear-gradient(135deg, #0088cc, #0066aa); color: white; }
        .quick-buy-btn.getgems { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); color: white; }
        .quick-buy-btn.portals { background: linear-gradient(135deg, #9b59b6, #8e44ad); color: white; }
        .quick-buy-btn.mrkt { background: linear-gradient(135deg, #e67e22, #d35400); color: white; }
        .quick-buy-btn.disabled {
            background: rgba(128,128,128,0.3);
            color: rgba(128,128,128,0.7);
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <!-- ═══════════════════════════════════════════════════════════════
         STICKY HEADER WITH RUNNING TICKER
         ═══════════════════════════════════════════════════════════════ -->
    <div class="sticky-header glass">
        <div class="header-gradient text-white p-4 rounded-2xl mb-3">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-xs opacity-80">💰 Баланс</p>
                    <p class="text-2xl font-bold" id="header-balance">0 TON</p>
                </div>
                <div class="text-right">
                    <p class="text-xs opacity-80">📊 P&L</p>
                    <p class="text-lg font-bold" id="header-pnl">0%</p>
                </div>
            </div>
        </div>
        
        <!-- Running ticker stats -->
        <div class="running-line text-xs opacity-60 py-1">
            <div class="running-line-content" id="running-stats">
                Загрузка статистики...
            </div>
        </div>
    </div>

    <!-- Pull to refresh indicator -->
    <div class="ptr-indicator" id="ptr-indicator">
        <div class="ptr-spinner"></div>
    </div>

    <!-- Main content -->
    <div id="app" class="ptr-container">
        <div id="tab-content" class="tab-content active"></div>
    </div>

    <!-- Bottom tabs -->
    <div id="tabs"></div>

    <!-- Chart Modal -->
    <div class="modal-overlay" id="chart-modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-lg" id="modal-title">График цены</h3>
                <button onclick="closeChartModal()" class="text-2xl opacity-60 hover:opacity-100">×</button>
            </div>
            <div id="modal-chart" class="chart-container"></div>
            <!-- Time range selectors -->
            <div class="filter-bar mt-4">
                <button class="filter-btn" onclick="setChartRange('1h')">1ч</button>
                <button class="filter-btn" onclick="setChartRange('24h')">24ч</button>
                <button class="filter-btn" onclick="setChartRange('7d')">7д</button>
                <button class="filter-btn active" onclick="setChartRange('30d')">30д</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // ═══════════════════════════════════════════════════════════════
        // HAPTIC FEEDBACK HELPER
        // ═══════════════════════════════════════════════════════════════
        function haptic(style = 'light') {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred(style);
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // STATE
        // ═══════════════════════════════════════════════════════════════
        let state = {
            activeTab: 'home',
            loading: true,
            refreshing: false,
            lastUpdate: null,
            data: null,
            charts: {},
            purchasePrices: {},  // Local storage for purchase prices
            currentChartRange: '30d',
            filters: {
                sniper: { minDiscount: 0, search: '', type: 'all', mirrorOnly: false },
                portfolio: { sortBy: 'profit', sortOrder: 'desc' },
                deals: { sortBy: 'score' },
                heatmap: { period: '1h' },
                liquidity: { minSales: 0 }
            }
        };

        // ═══════════════════════════════════════════════════════════════
        // API FETCH
        // ═══════════════════════════════════════════════════════════════
        async function fetchData() {
            try {
                const response = await fetch('data.json?' + Date.now());
                if (response.ok) {
                    const data = await response.json();
                    state.data = {
                        user: data.users[Object.keys(data.users)[0]] || {
                            balance: 0,
                            portfolio: [],
                            purchase_prices: {}
                        },
                        markets: [
                            { name: 'Tonnel', floor: 0, change: 0, volume: 0, color: '#2196F3', lastUpdate: Date.now() },
                            { name: 'Portals', floor: 0, change: 0, volume: 0, color: '#9C27B0', lastUpdate: Date.now() },
                            { name: 'MRKT', floor: 0, change: 0, volume: 0, color: '#FF9800', lastUpdate: Date.now() },
                            { name: 'Getgems', floor: 0, change: 0, volume: 0, color: '#ff6b6b', lastUpdate: Date.now() }
                        ],
                        sniper: data.sniper || [],
                        sales: data.recent_sales || [],
                        arbitrage: data.arbitrage || [],
                        price_history: data.price_history || {},
                        market_stats: data.market_stats || {},
                        best_deals: data.best_deals || [],
                        heatmap: data.heatmap || []
                    };
                } else {
                    throw new Error('No data');
                }
            } catch (e) {
                state.data = getMockData();
            }

            state.lastUpdate = new Date();
            state.loading = false;
        }

        function getMockData() {
            return {
                user: { 
                    balance: 150,
                    purchase_prices: {
                        '123': { price: 7.5, name: 'Toy Bear', market: 'Tonnel' }
                    }
                },
                markets: [
                    { name: 'Tonnel', floor: 8.50, change: 5.2, volume: 1250, color: '#2196F3', lastUpdate: Date.now() },
                    { name: 'Portals', floor: 9.20, change: -2.1, volume: 890, color: '#9C27B0', lastUpdate: Date.now() },
                    { name: 'MRKT', floor: 7.80, change: 12.5, volume: 2100, color: '#FF9800', lastUpdate: Date.now() },
                    { name: 'Getgems', floor: 8.00, change: 3.0, volume: 500, color: '#ff6b6b', lastUpdate: Date.now() }
                ],
                sniper: [
                    { name: 'Toy Bear', number: '#121', price: 6.50, floor: 8.50, discount: 23.5, url: '#', roi: 15.2, liquidity: 'B', gift_id: '123' },
                    { name: 'Skull Flower', number: '#777', price: 15.00, floor: 18.50, discount: 18.9, url: '#', roi: 8.5, liquidity: 'A', gift_id: '777' },
                    { name: 'Panda', number: '#1000', price: 10.00, floor: 12.50, discount: 20.0, url: '#', roi: 12.0, liquidity: 'C', gift_id: '1000' }
                ],
                sales: [
                    { name: 'Dolphin', price: 15.5, time: '12:30', timestamp: Date.now() / 1000 },
                    { name: 'Cat', price: 22.0, time: '12:28', timestamp: Date.now() / 1000 }
                ],
                arbitrage: [
                    { name: 'Toy Bear', buy_market: 'Tonnel', sell_market: 'MRKT', profit: 2.5, roi: 25.0, liquidity: 'A' }
                ],
                best_deals: [
                    { name: 'Toy Bear', price_growth_pct: 15.5, sales_volume: 450, best_roi: 22.0, current_price: 8.5 },
                    { name: 'Panda', price_growth_pct: -5.2, sales_volume: 320, best_roi: 12.0, current_price: 12.3 }
                ],
                price_history: {
                    'Toy Bear': Array.from({length: 30}, (_, i) => ({
                        time: new Date(Date.now() - (29 - i) * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
                        value: +(8 + Math.random() * 3).toFixed(2)
                    })),
                    'Skull Flower': Array.from({length: 30}, (_, i) => ({
                        time: new Date(Date.now() - (29 - i) * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
                        value: +(15 + Math.random() * 5).toFixed(2)
                    }))
                },
                heatmap: [
                    { name: 'Toy Bear', sales_count: 15, demand_score: 85, trend: 'hot' },
                    { name: 'Panda', sales_count: 8, demand_score: 45, trend: 'warm' },
                    { name: 'Dolphin', sales_count: 3, demand_score: 20, trend: 'cold' }
                ]
            };
        }

        // ═══════════════════════════════════════════════════════════════
        // PULL TO REFRESH
        // ═══════════════════════════════════════════════════════════════
        let startY = 0, currentY = 0;

        document.addEventListener('touchstart', e => {
            if (window.scrollY === 0) {
                startY = e.touches[0].pageY;
            }
        }, { passive: true });

        document.addEventListener('touchmove', e => {
            if (startY > 0 && window.scrollY === 0) {
                currentY = e.touches[0].pageY;
                const diff = currentY - startY;
                if (diff > 0 && diff < 150) {
                    document.getElementById('ptr-indicator').style.top = `${diff - 60}px`;
                }
            }
        }, { passive: true });

        document.addEventListener('touchend', async () => {
            if (currentY - startY > 100 && !state.refreshing) {
                haptic('medium');
                state.refreshing = true;
                await fetchData();
                render();
                state.refreshing = false;
            }
            startY = 0;
            currentY = 0;
            document.getElementById('ptr-indicator').style.top = '-60px';
        });

        // ═══════════════════════════════════════════════════════════════
        // UTILS
        // ═══════════════════════════════════════════════════════════════
        function isMirrorNumber(number) {
            if (!number) return false;
            const digits = String(number).replace(/\D/g, '');
            if (digits.length < 2) return false;
            // Палиндромы
            if (digits === digits.split('').reverse().join('')) return true;
            // Репдигиты
            if (new Set(digits).size === 1) return true;
            // Круглые
            if (digits.endsWith('00')) return true;
            // Последовательности
            const isAscending = digits.split('').every((d, i) => i === 0 || parseInt(d) === parseInt(digits[i-1]) + 1);
            const isDescending = digits.split('').every((d, i) => i === 0 || parseInt(d) === parseInt(digits[i-1]) - 1);
            return isAscending || isDescending;
        }

        function filterSniper(items) {
            const { minDiscount, search, mirrorOnly } = state.filters.sniper;
            return items.filter(item => {
                const matchDiscount = item.discount >= minDiscount;
                const matchSearch = !search || item.name.toLowerCase().includes(search.toLowerCase());
                const matchMirror = !mirrorOnly || isMirrorNumber(item.number);
                return matchDiscount && matchSearch && matchMirror;
            });
        }

        function formatSmartNumber(value) {
            if (value >= 1000) return `${(value / 1000).toFixed(1)}K`;
            if (value >= 1) return value.toFixed(2);
            return value.toFixed(4);
        }

        function getPriceAgeClass(timestamp) {
            const age = (Date.now() - timestamp * 1000) / 1000;
            if (age < 60) return 'fresh';
            if (age < 300) return 'recent';
            if (age < 1800) return 'old';
            return 'stale';
        }

        function getPriceAgeEmoji(timestamp) {
            const age = (Date.now() - timestamp * 1000) / 1000;
            if (age < 60) return '🟢';
            if (age < 300) return '🟡';
            if (age < 1800) return '🟠';
            return '🔴';
        }

        // ═══════════════════════════════════════════════════════════════
        // P&L CALCULATION
        // ═══════════════════════════════════════════════════════════════
        function calculatePnL(giftId, currentPrice) {
            const purchase = state.purchasePrices[giftId] || state.data?.user?.purchase_prices?.[giftId];
            if (!purchase) return null;
            
            const feeRate = 0.05; // 5% комиссия (настраиваемый параметр)
            const profit = currentPrice - purchase.price;
            const fee = currentPrice * feeRate;
            const netProfit = currentPrice - purchase.price - fee;
            const roi = (netProfit / purchase.price) * 100;
            
            return { profit, netProfit, roi, purchase: purchase.price, fee };
        }

        function calculatePortfolioPnL() {
            const purchases = state.data?.user?.purchase_prices || {};
            const customPurchases = state.purchasePrices;
            const allPurchases = { ...purchases, ...customPurchases };
            
            let totalInvested = 0;
            let totalCurrent = 0;
            
            for (const [id, purchase] of Object.entries(allPurchases)) {
                totalInvested += purchase.price;
                const history = state.data?.price_history?.[purchase.name] || [];
                const currentPrice = history.length > 0 ? history[history.length - 1].value : purchase.price;
                totalCurrent += currentPrice;
            }
            
            const profit = totalCurrent - totalInvested;
            const profitPct = totalInvested > 0 ? (profit / totalInvested * 100) : 0;
            
            return { totalInvested, totalCurrent, profit, total_profit_pct: profitPct };
        }

        function handlePurchasePriceChange(giftId, value) {
            const price = parseFloat(value);
            if (isNaN(price) || price <= 0) {
                delete state.purchasePrices[giftId];
            } else {
                state.purchasePrices[giftId] = {
                    price: price,
                    name: state.data?.sniper?.find(s => s.gift_id === giftId)?.name || 'Unknown',
                    market: 'Tonnel',
                    timestamp: Date.now() / 1000
                };
            }
            render();
        }

        // ═══════════════════════════════════════════════════════════════
        // SPARKLINE CANVAS
        // ═══════════════════════════════════════════════════════════════
        function drawSparkline(canvas, data, color = '#667eea') {
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            
            ctx.clearRect(0, 0, width, height);
            
            if (!data || data.length < 2) return;
            
            const values = data.slice(-20).map(d => d.value);
            const min = Math.min(...values);
            const max = Math.max(...values);
            const range = max - min || 1;
            
            const isUp = values[values.length - 1] >= values[0];
            const lineColor = isUp ? '#22c55e' : '#ef4444';
            
            ctx.beginPath();
            ctx.strokeStyle = lineColor;
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            values.forEach((v, i) => {
                const x = (i / (values.length - 1)) * width;
                const y = height - ((v - min) / range) * height * 0.8 - height * 0.1;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            
            ctx.stroke();
            
            ctx.beginPath();
            ctx.fillStyle = isUp ? 'rgba(34,197,94,0.2)' : 'rgba(239,68,68,0.2)';
            values.forEach((v, i) => {
                const x = (i / (values.length - 1)) * width;
                const y = height - ((v - min) / range) * height * 0.8 - height * 0.1;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.lineTo(width, height);
            ctx.lineTo(0, height);
            ctx.closePath();
            ctx.fill();
        }

        // ═══════════════════════════════════════════════════════════════
        // TRADINGVIEW CHART
        // ═══════════════════════════════════════════════════════════════
        function createPriceChart(containerId, data, color = '#667eea') {
            const container = document.getElementById(containerId);
            if (!container || !data || data.length === 0) return null;

            container.innerHTML = '';

            const chart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: 250,
                layout: {
                    background: { color: 'transparent' },
                    textColor: 'var(--tg-text)',
                },
                grid: {
                    vertLines: { color: 'rgba(128, 128, 128, 0.1)' },
                    horzLines: { color: 'rgba(128, 128, 128, 0.1)' },
                },
                rightPriceScale: { borderVisible: false },
                timeScale: { borderVisible: false, timeVisible: false },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            });

            const areaSeries = chart.addAreaSeries({
                lineColor: color,
                topColor: color + '40',
                bottomColor: color + '00',
                lineWidth: 2,
            });

            areaSeries.setData(data.map(d => ({ time: d.time, value: d.value })));

            new ResizeObserver(entries => {
                if (entries.length === 0 || entries[0].target !== container) return;
                chart.applyOptions({ height: entries[0].contentRect.height });
            }).observe(container);

            return chart;
        }

        // ═══════════════════════════════════════════════════════════════
        // COPY TO CLIPBOARD
        // ═══════════════════════════════════════════════════════════════
        async function copyToClipboard(text, button) {
            try {
                await navigator.clipboard.writeText(text);
                const originalText = button.textContent;
                button.textContent = '✓';
                button.classList.add('copied');
                haptic('light');
                setTimeout(() => {
                    button.textContent = originalText;
                    button.classList.remove('copied');
                }, 1500);
            } catch (e) {
                console.error('Copy failed:', e);
            }
        }
